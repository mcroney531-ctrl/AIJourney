<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Progression — Development Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* core neutrals */
    --ink:#16302f; --paper:#fcfcfc; --muted:#6b8280;
    --rule:#cfe0dc; --card:#f7fbfa;
    /* teal system — from the tracker */
    --shell:#12363a; --seg:#4f9a9b; --seg-lit:#6fb8b6; --seg-dim:#3d7d80;
    --tint-1:rgba(111,184,182,.28); --tint-2:rgba(79,154,155,.14);
    /* single warm accent, used sparingly */
    --accent:#b6452c; --accent-soft:#d98b5f;
    /* deep contrast for thesis */
    --thesis:#12363a; --thesis-soft:rgba(79,154,155,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--paper);color:var(--ink);
    font-family:'Merriweather',serif;font-weight:300;
    padding:44px 24px 90px;min-height:100vh;
    background-image:radial-gradient(circle at 12% 6%, rgba(79,154,155,.07), transparent 45%),
                     radial-gradient(circle at 88% 94%, rgba(18,54,58,.05), transparent 45%);
  }
  .wrap{max-width:1000px;margin:0 auto;}

  /* MASTHEAD */
  .masthead{text-align:center;margin-bottom:8px;}
  .masthead .kicker{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--seg-dim);font-weight:500;}
  .masthead h1{font-family:'Fraunces',serif;font-size:46px;font-weight:600;letter-spacing:-1px;line-height:1.05;margin:10px 0 6px;}
  .masthead .sub{font-size:13.5px;color:var(--muted);max-width:560px;margin:0 auto;line-height:1.6;}
  .divider{width:60px;height:2px;background:var(--seg);margin:28px auto 40px;}

  /* SUMMARY PANEL */
  .summary{
    background:linear-gradient(135deg, rgba(111,184,182,.28) 0%, rgba(79,154,155,.16) 55%, rgba(111,184,182,.10) 100%);
    border:3px solid var(--shell);
    border-radius:10px;
    padding:22px 32px 26px;margin-bottom:30px;
    box-shadow:0 10px 30px rgba(18,54,58,.16);
    display:flex;flex-direction:column;align-items:flex-start;
  }
  .summary .s-tile{
    flex:0 0 auto;width:50px;height:50px;border-radius:12px;
    background:var(--shell);
    display:flex;align-items:center;justify-content:center;font-size:23px;
    box-shadow:0 3px 10px rgba(18,54,58,.22);
  }
  .summary .s-phase{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:5px;}
  .summary h2{font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:-.4px;line-height:1.14;margin-bottom:4px;}
  .summary .s-era{font-size:12.5px;color:#5c6f6c;font-style:italic;margin-bottom:12px;}
  .summary p.s-lede{font-size:14px;line-height:1.75;max-width:680px;}
  .summary .s-body{flex:1;min-width:0;}
  .summary .s-inner{display:flex;gap:20px;align-items:flex-start;width:100%;}
  .mini-track{
    display:inline-flex;gap:1px;align-items:center;
    background:var(--shell);border-radius:999px;padding:2px 3px;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.35);
    margin-bottom:14px;
  }
  .mini-track .mt{
    width:5px;height:8px;background:var(--seg-dim);
    clip-path:polygon(22% 0,100% 0,78% 100%,0 100%);
    transition:background .25s ease;
  }
  .mini-track .mt:first-child{clip-path:polygon(0 0,100% 0,78% 100%,0 100%);border-radius:999px 0 0 999px;}
  .mini-track .mt:last-child{clip-path:polygon(22% 0,100% 0,100% 100%,0 100%);border-radius:0 999px 999px 0;}
  .mini-track .mt.on{background:var(--seg-lit);}
  .mini-track .mt.slot{background:#2a5457;}
  @media(max-width:640px){
    .summary{padding:22px 20px;}
    .summary .s-inner{flex-direction:column;gap:14px;}
  }

  /* BAR */
  .bar-scroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}
  .shell{
    background:var(--shell);border-radius:999px;padding:9px;
    box-shadow:0 12px 30px rgba(18,54,58,.28), inset 0 2px 6px rgba(0,0,0,.35);
    overflow:hidden;height:88px;min-width:760px;
  }
  .segs{display:flex;height:100%;gap:4px;}
  .seg{
    flex:1;position:relative;cursor:pointer;background:var(--seg-dim);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    transition:background .28s ease;color:rgba(255,255,255,.62);
    clip-path:polygon(14% 0, 100% 0, 86% 100%, 0% 100%);
  }
  .seg:first-child{clip-path:polygon(0 0,100% 0,86% 100%,0 100%);border-radius:999px 0 0 999px;}
  .seg:last-child{clip-path:polygon(14% 0,100% 0,100% 100%,0 100%);border-radius:0 999px 999px 0;}
  .seg:hover{background:var(--seg);color:#fff;}
  .seg.on{background:var(--seg-lit);color:#fff;box-shadow:inset 0 0 0 2px rgba(255,255,255,.55);}
  .seg.open-slot{background:#2a5457;color:rgba(255,255,255,.4);}
  .seg.open-slot:hover{background:#376a6d;}
  .s-ico{font-size:19px;line-height:1;}
  .s-num{font-family:'Fraunces',serif;font-weight:700;font-size:11px;letter-spacing:.08em;opacity:.85;}
  .hint{text-align:center;font-size:12px;color:var(--muted);margin-top:12px;font-style:italic;}

  /* DETAIL */
  .detail{
    margin-top:30px;background:var(--card);border:1px solid var(--rule);
    border-top:5px solid var(--seg-lit);border-radius:12px;padding:34px 34px;
    box-shadow:0 12px 40px rgba(18,54,58,.07);
    animation:rise .45s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes slideFromRight{
    0%{opacity:0;transform:translateX(38px);}
    100%{opacity:1;transform:translateX(0);}
  }
  @keyframes slideFromLeft{
    0%{opacity:0;transform:translateX(-38px);}
    100%{opacity:1;transform:translateX(0);}
  }
  .summary.go-right{animation:slideFromRight .42s cubic-bezier(.22,1,.36,1) both;}
  .summary.go-left{animation:slideFromLeft .42s cubic-bezier(.22,1,.36,1) both;}
  .detail-head{border-bottom:1px solid var(--rule);padding-bottom:20px;margin-bottom:28px;display:flex;gap:20px;align-items:flex-start;}
  .head-ico{
    flex:0 0 auto;width:54px;height:54px;border-radius:12px;background:var(--seg-lit);
    display:flex;align-items:center;justify-content:center;font-size:25px;
  }
  .d-phase{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:6px;}
  .detail-head h2{font-family:'Fraunces',serif;font-size:29px;font-weight:600;letter-spacing:-.5px;line-height:1.12;}
  .d-era{margin-top:7px;font-size:13px;color:var(--muted);font-style:italic;}
  .detail-lede{font-size:14.5px;line-height:1.75;margin-bottom:32px;max-width:670px;}

  /* BENTO GRID — mixed horizontal + vertical */
  .block-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    grid-auto-rows:minmax(10px,auto);
    grid-auto-flow:row dense;
    gap:14px;
    align-items:start;
  }
  .block{
    background:#fff;border:1px solid var(--rule);border-radius:10px;
    padding:20px 22px;box-shadow:0 2px 10px rgba(18,54,58,.05);
    transition:box-shadow .25s ease, transform .25s ease, border-color .25s ease;
    height:100%;
  }
  .block:hover{box-shadow:0 8px 22px rgba(18,54,58,.11);transform:translateY(-2px);border-color:var(--seg-lit);}

  /* span classes — width */
  .block.w-2{grid-column:span 2;}
  .block.w-3{grid-column:span 3;}
  .block.w-4{grid-column:span 4;}
  .block.w-6{grid-column:span 6;}
  /* tall tiles: narrow column, content runs vertically */
  .block.tall{grid-row:span 2;}

  /* lesson tile — the anchor, full width */
  .block.lesson{
    background:linear-gradient(135deg,var(--tint-1) 0%,var(--tint-2) 100%);
    border:2px solid var(--shell);
  }
  .block.lesson h3{color:var(--shell);border-bottom-color:rgba(18,54,58,.25);}
  .block.lesson li{font-size:13.2px;}
  .block.lesson li::before{background:var(--shell);}

  /* narrow/vertical tiles get tighter type */
  .block.w-2 li{font-size:12.2px;line-height:1.55;}
  .block.w-2 h3{font-size:9.5px;letter-spacing:.16em;}

  /* Observations & Experience split layout */
  .oe-split{display:grid;grid-template-columns:1fr 1px 1fr;gap:18px;}
  .oe-split .oe-col h4{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--seg-dim);margin-bottom:10px;font-weight:600;}
  .oe-split .oe-line{background:var(--rule);}
  .oe-split ul{list-style:none;}
  .oe-split li{font-size:12.8px;line-height:1.6;padding:6px 0 6px 16px;position:relative;}
  .oe-split li::before{content:'';position:absolute;left:0;top:13px;width:5px;height:5px;border-radius:50%;background:var(--seg);}
  .oe-split li strong{color:var(--shell);font-weight:700;}
  @media(max-width:640px){
    .oe-split{grid-template-columns:1fr;}
    .oe-split .oe-line{display:none;height:1px;}
  }

  @media(max-width:900px){
    .block-grid{grid-template-columns:repeat(4,1fr);}
    .block.w-2{grid-column:span 2;}
    .block.w-3{grid-column:span 2;}
    .block.w-4{grid-column:span 4;}
    .block.w-6{grid-column:span 4;}
    .block.tall{grid-row:span 1;}
  }
  @media(max-width:640px){
    .block-grid{grid-template-columns:1fr;gap:12px;}
    .block.w-2,.block.w-3,.block.w-4,.block.w-6{grid-column:span 1;}
    .block.tall{grid-row:span 1;}
    .detail{padding:24px 18px;}
    body{padding:28px 14px 60px;}
    .masthead h1{font-size:34px;}
    .detail-head{flex-direction:column;gap:14px;}
  }
  .block h3{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--seg-dim);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--rule);}
  .block ul{list-style:none;}
  .block li{font-size:12.8px;line-height:1.6;padding:6px 0 6px 18px;position:relative;}
  .block li::before{content:'';position:absolute;left:0;top:13px;width:5px;height:5px;border-radius:50%;background:var(--seg);}
  .block a{color:var(--accent);text-decoration:underline;}
  /* narrative "Entering This Phase" variant — intro prose, labeled bullets, closing line */
  .block .enter-lede{font-size:13.2px;line-height:1.72;margin-bottom:12px;}
  .block .enter-lede strong{font-weight:700;color:var(--shell);}
  .block .enter-close{font-size:13.2px;line-height:1.72;margin-top:14px;font-style:italic;}
  .block .enter-list li{padding:7px 0 7px 18px;}
  .block .enter-list li::before{top:14px;}
  .block .enter-list .lead{font-weight:700;color:var(--shell);}

  .component,.thesis,.questions{grid-column:1/-1;border-radius:10px;padding:24px 28px;}
  .component{background:linear-gradient(135deg,rgba(111,184,182,.16) 0%,rgba(79,154,155,.05) 100%);border:1px solid var(--rule);border-left:4px solid var(--seg-lit);}
  .c-tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--seg-dim);font-weight:600;margin-bottom:10px;}
  .component h4{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--shell);line-height:1.3;margin-bottom:10px;}
  .component p,.thesis p{font-size:12.8px;line-height:1.72;}
  .thesis{background:var(--shell);border:2px solid var(--shell);color:#eaf4f2;}
  .t-tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--seg-lit);font-weight:600;margin-bottom:10px;}
  .thesis h4{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:10px;}
  .questions{background:rgba(79,154,155,.07);border:1px dashed var(--seg);}
  .questions h3{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--seg-dim);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--rule);}
  .questions ul{list-style:none;}
  .questions li{font-size:12.8px;line-height:1.65;padding:7px 0 7px 22px;position:relative;}
  .questions li::before{content:'?';position:absolute;left:0;top:6px;font-family:'Fraunces',serif;font-weight:700;color:var(--seg-dim);font-size:15px;}
  .placeholder-note{text-align:center;color:var(--muted);font-style:italic;font-size:15px;padding:24px 0;line-height:1.7;}
  .footer{text-align:center;margin-top:56px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .footer::before{content:'';display:block;width:40px;height:2px;background:var(--seg);margin:0 auto 18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="kicker">Personal &amp; Professional Development</div>
    <h1>The Progression</h1>
    <p class="sub">Not a one-off course. An exponential arc — each phase built from the last. Click a phase to open it.</p>
  </div>
  <div class="divider"></div>

  <div class="summary" id="summary"></div>

  <div class="bar-scroll">
    <div class="shell"><div class="segs" id="segs"></div></div>
  </div>
  <p class="hint">click any phase</p>

  <div class="detail" id="detail"></div>
  <div class="footer">Living Document · Building Gradually · 2026</div>
</div>

<script>
const phases = [
  {
    ico:"🌱", label:"Phase 01", title:"Curiosity, Skepticism &amp; Fear", era:"Where everyone actually starts",
    lede:"The honest starting line. Before any fluency, there was the same mix everyone feels — curiosity pulling one way, skepticism and fear pulling the other. This phase exists so the arc starts where the reader is, not where I ended up.",
    lessons:[
      "Almost nobody starts curious and confident. The common starting position is ambivalence — interested and uneasy at the same time — and that is a normal place to begin, not a deficiency.",
      "Fear that gets named loses most of its power. Fear that gets dismissed hardens into refusal.",
      "The first step is rarely a tool decision. It is permission to be uncertain in public."
    ],
    comprised:["I started back in 2023 with a few random test sessions, just to see what LLMs could do at the time. After that — aside from the occasional question — I barely touched it and counted myself a skeptic. The results weren't good, it didn't feel worthwhile, and I couldn't name a single case where adding AI actually helped. This is exactly where a lot of people still sit.","I stayed there for the next year or two, watching the models improve and the conversation around AI grow more divisive.","The tipping point was OpenAI's Sora 2. Seeing how realistic AI video had become sharpened every concern I already had — and around the same time I found a social page, ShowTools, that showcased those videos and called out the \"tells\" for spotting them.","That's when I decided to jump fully in. I wanted to help by raising awareness for the people around me — I pictured a small, occasional \"real or AI?\" bit at the end of a team huddle. Then it hit me: to run it, I'd have to reliably spot this stuff myself, and I couldn't. I still didn't know the first thing about AI. That's what led me to the UMD course."],
    built:["Nothing yet — this phase comes before any building begins"],
    observed:["The wariness is rational, not ignorant — it deserves a real answer","The only thing that moves someone out of this phase is a real, lived \"win\" — proof, not persuasion. The hype, the novelty, and the uncanny sense of a machine acting on its own raise everyone's guard, and no argument fully lowers it. Only a result does. And the win is a launch point, not a finish line — the moment fluency starts, not a box to check."],
    resources:["No course, no framework — pure curiosity","The reason I can tell a skeptic honestly: I started where you are"],
    work:["The willingness to sit in discomfort became the thing I could later offer other people"],
    enter:{
      intro:"<strong>When LLMs hit the mainstream around 2023, I paid them little mind.</strong> After years of tech hype — crypto, NFTs, and the rest — it was easy to file this under the same heading and move on. But it didn\'t fade the way those did. The noise only grew louder, and over time a few sentiments settled out of it:",
      points:[
        {lead:"The magic machine.", body:"AI was billed as the thing that knows almost everything and can do almost anything — and whatever it couldn\'t do yet, it would be able to do soon."},
        {lead:"A threat to my livelihood.", body:"It felt like only a matter of time before AI could run a live session or do my job outright — my career suddenly on borrowed time."},
        {lead:"The end of a shared reality.", body:"I was already alarmed by what social media had done to society; adding AI felt like it could be the breaking point. How is anyone supposed to tell what\'s real anymore? It was a serious problem before AI ever entered the picture."},
        {lead:"The next great divider.", body:"Maybe I needed to learn a little, just to stay aware — the way a grandparent who never learned smartphones slowly gets cut off. Miss this piece, and you might not know how to interact with everyday tech later in life."}
      ],
      outro:"So I set out to learn."
    }
  },
  {
    ico:"🎓", label:"Phase 02", title:"UMD Course Completion", era:"The visible marker",
    oe:{left:"What Happened: Key Learnings"},
    lede:"The first externally legible marker of a practice already well underway. Worth being precise about what a credential is and is not: it confirms and translates existing practice into a form institutions can read. It rarely creates the practice.",
    lessons:[
      "Credentials are translation devices. They convert practice into something an organization can see, fund, and act on.",
      "The visible marker is almost never the origin. Assuming otherwise causes organizations to misjudge where capability actually lives on their teams.",
      "There are likely people in any organization who are further along than their credentials suggest — and the only way to find them is to ask about practice, not paper.",
      "A credential can change how you are seen overnight. It changes what you can do far more slowly."
    ],
    comprised:["<strong>Demystification.</strong> The word itself does a lot of work, and it's where the course opened. Learning the mechanics — every token turned into numbers, the neural network underneath, embeddings and word2vec — changed how I saw the thing I was interacting with: <strong>it's not the magic machine.</strong> That was the Wizard-of-Oz, pull-back-the-curtain moment — I came away understanding how it actually interprets what I give it, and where its limits are.","<strong>John Deere's See &amp; Spray (a case study).</strong> We looked critically at a real business use of AI. The tech was genuinely innovative — fine-grained scanning that scaled beautifully — but it didn't match what the customers actually needed. The farmers on the ground didn't require that level of detail, so the novelty wasn't especially relevant, and there was an unresolved dispute over who owned the data it collected. A useful caution about rolling AI out to clients: just as the course appealed to me because it spoke in terms of \"here's how this helps you\" rather than \"Google replacement / draft an email,\" that's the framing and functionality a product needs in order to land.","<strong>Address the discomfort head-on.</strong> The course kept a critical eye throughout — \"here's what we're seeing right now, let's talk about it\" — and grounded it in specifics: real examples of model bias, cases like See &amp; Spray, a dedicated safety and governance module, and an honest overview of the other concerns and anxieties people bring to this."],
    built:["My first build — a research guide on the concerns I still had (the environment, society, the gatekeepers), worked through with Claude. It began as learning, not a page; halfway in I realized the chat could turn the research itself into something shareable — and many rounds of iteration later, it laid the groundwork for the front-end breakthrough. Those same rounds started to shift how I thought about making things with AI — how much of the work is still yours to do, and how it only goes as far as you can take it. (<a href=\'https://mcroney531-ctrl.github.io/Spring26AIStudy/\' target=\'_blank\' rel=\'noopener\'>view the build</a>)"],
    observed:["<strong>Cut through the media hype; trust real, on-the-ground experience.</strong> The headline feats — AI beating the best human at chess, cracking some elite math problem — were exactly the stories that, before demystification, amplified the Phase 01 fears. <strong>Goodhart's law</strong> is the one that stuck: once a measure becomes the target, it stops being a good measure. Those wins are optimized to a narrow benchmark, not to the everyday reality where the real value lives. Understanding the mechanics drained the hype of its power and put the weight back on actual application.","<strong>Genuine, grounded concern is what buys credibility.</strong> Validating and voicing legitimate worries about AI earns trust — but it can't be feigned. UMD modeled the whole move: naming a concern is only the first piece; the second is actually thinking it through and offering a real analysis, grounded back in the real world. That's what does the convincing — precisely because it's neither hype nor full-on adoption."],
    resources:["UMD AI &amp; Career Empowerment certificate"],
    work:["Triggered the leadership attention that followed"],
    personal:["Mine produced an unsolicited public shoutout in a cross-functional meeting — which is the only reason this document exists."],
    enter:{
      intro:"<strong>What pulled me toward the UMD course was its newness, the breadth of its module topics, and — above all — the career-empowerment angle.</strong> It took something abstract and made it tangible. I read it as \"here's how you can use this to help yourself in meaningful ways\" — a genuinely different pitch than the \"Google replacement\" and \"draft me an email\" uses that are usually the only ones on display."
    }
  },
  {
    ico:"🔧", label:"Phase 03", title:"Initial Applications", era:"Personal first",
    lede:"The first real applications weren't at work — they were personal. That is where fluency actually gets built: on things you care about, where feedback is immediate and nobody is grading you. Professional use grows out of that, not the other way around.",
    lessons:[
      "Start where the stakes are yours. Depth of engagement comes from caring about the domain, not from professional obligation.",
      "You cannot write a precise prompt about something you do not understand. Prompt quality is a readout of thinking quality — which is why personal expertise is the fastest on-ramp.",
      "Most people's impression of AI is shallow because the shallow version is the only one they have been shown. One demonstration at real depth changes the assessment.",
      "The instinct transfers. Whatever you learn wrestling with a personal problem is the same instinct you will bring to a work problem."
    ],
    comprised:["<strong>My first image upload.</strong> It was the first time I'd put any kind of image into an LLM, and I was impressed by how well it read the game stat sheets — abbreviations and all — without much context. It also picked up on details in the image I hadn't mentioned or wasn't even focused on.","<strong>Context limits, and discovering handoff documents.</strong> Once I was thoroughly sucked in, I hit the peak of a season and — oh no — could no longer upload photos to that session. I'd reached the limit, and it stopped the fun in its tracks. But I thought back to what I knew about how LLMs read a chat and realized I could use it against itself: export the memory from the session and drop it into a fresh chat to pick right back up. Processing text is an LLM's bread and butter, so I had the old chat generate an extremely rich breakdown — which I called a 'master prompt' at the time. To this day I don't know if that's a real term or one I made up, but after many seasons of doing this I randomly came across the phrase 'handoff documents' in an AI context and realized that's exactly what I'd been building. It taught me about chat limits, carrying information across sessions, and that techniques like handoff documents exist — something I've used for real work constantly ever since.","<strong>Still far from perfect — but now I was the director.</strong> I kept bumping into its limits: repetitive prose, the distinct way it 'talks' even with instructions and context, the times it would fixate on something irrelevant. It was immersive, but not seamless. The difference was that for the first time I was the director rather than a seeker — more 'no, not like that, do it like this,' or 'stop saying that,' than just asking and accepting."],
    built:["Personal builds pushed hard because the outcome mattered","A per-project context habit — load the full picture before asking for anything","Early workflow automation once the instinct matured"],
    observed:["AI-augmented work lands best when it starts from a real problem, especially a stickier one that has resisted easy fixes","<strong>What you get out is downstream of what you bring.</strong> On my own time I carried the same storyline idea into another area of interest — geopolitical what-if scenarios I couldn't really talk through with anyone, because the subject knowledge just wasn't there. Somewhere in those it landed: 'Oh — this is like writing my own little story.' The content was mine and the scenarios were mine, so what came back was shaped by what I brought. That was the whole thesis, felt long before I could put words to it. Eventually it reached further — into real life and professional topics, especially around Q4 review time. The same exact concept emerged, and the AI picked up on patterns across my life, career, and relationships over time that genuinely brought clarity to my thinking and, at times, my real-world communication. I never set out for it to be a 'coach,' but for a stretch in this phase that's what the experience became — and that mattered too. All of it reframed how I thought about interacting with AI, and what the user's relationship to it actually is. The fastest way to feel it is to use it on something only you know well.","Continuity and accumulated context change the interaction entirely","Personal-first is the reliable on-ramp; work-first usually stalls","<strong>Play and exploration matter more than they get credit for.</strong> There's a reason there are master's-level courses on play in learning and child development — and not only for the social side. Play is where discovery happens in its rawest form: where the 'fun' and the positive, reinforcing experiences live, and where you can make mistakes freely because the whole mode is 'do whatever.' With something as broad and abstract as AI — which can run in almost infinite directions — that kind of open discovery isn't optional; it's how you find your footing. And 'play' doesn't have to mean a game or a scenario. It might be wiring it into Excel to explore new interactions, or brainstorming workflows to make something faster. It looks different for everyone, which is exactly why the exploration phase matters."],

const segs=document.getElementById('segs');
phases.forEach((p,i)=>{
  const s=document.createElement('div');
  s.className='seg'+(i===0?' on':'')+(p.openSlot?' open-slot':'');
  s.innerHTML=`<span class="s-ico">${p.ico}</span><span class="s-num">${String(i+1).padStart(2,'0')}</span>`;
  s.onclick=()=>select(i);
  segs.appendChild(s);
});

function block(t,items,shape,cls){
  if(!items||!items.length) return '';
  const sh = shape || 'w-3';
  const extra = cls ? ' '+cls : '';
  return `<div class="block ${sh}${extra}"><h3>${t}</h3><ul>${items.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
}
function oeBlock(experience,observation,shape,opts){
  if((!experience||!experience.length)&&(!observation||!observation.length)) return '';
  const sh = shape || 'w-4 tall';
  const o = opts || {};
  const title = o.title || 'Observations &amp; Experience';
  const leftLabel = o.left || 'What Happened';
  const rightLabel = o.right || 'Takeaways';
  const col=(label,items)=>`<div class="oe-col"><h4>${label}</h4><ul>${(items||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  return `<div class="block ${sh}"><h3>${title}</h3>
    <div class="oe-split">
      ${col(leftLabel,experience)}
      <div class="oe-line"></div>
      ${col(rightLabel,observation)}
    </div>
  </div>`;
}
function enterBlock(p){
  if(p.enter){
    const e=p.enter;
    const pts=(e.points||[]).map(pt=>`<li><span class="lead">${pt.lead}</span> ${pt.body}</li>`).join('');
    return `<div class="block w-6"><h3>Entering This Phase:</h3>
      <p class="enter-lede">${e.intro}</p>
      ${pts?`<ul class="enter-list">${pts}</ul>`:''}
      ${e.outro?`<p class="enter-close">${e.outro}</p>`:''}
    </div>`;
  }
  return block('Entering This Phase:',p.personal,'w-6');
}
function comps(p){
  if(!p.components) return '';
  return p.components.map(c=>`<div class="component"><div class="c-tag">${c.tag}</div><h4>${c.title}</h4><p>${c.body}</p></div>`).join('');
}
function thesis(p){
  if(!p.hasThesis) return '';
  return `<div class="thesis"><div class="t-tag">${p.thesisTag}</div><h4>${p.thesisTitle}</h4><p>${p.thesisBody}</p></div>`;
}
function quest(p){
  if(!p.questions) return '';
  return `<div class="questions"><h3>Questions</h3><ul>${p.questions.map(q=>`<li>${q}</li>`).join('')}</ul></div>`;
}

let prevIndex = 0;

function select(i){
  document.querySelectorAll('.seg').forEach((s,x)=>s.classList.toggle('on',x===i));
  const p=phases[i];
  const sum=document.getElementById('summary');
  const d=document.getElementById('detail');

  const miniTicks = phases.map((ph,x)=>
    `<div class="mt${x===i?' on':''}${ph.openSlot?' slot':''}"></div>`
  ).join('');

  sum.innerHTML=`
    <div class="mini-track">${miniTicks}</div>
    <div class="s-inner">
      <div class="s-tile">${p.ico}</div>
      <div class="s-body">
        <div class="s-phase">${p.label}</div>
        <h2>${p.title}</h2>
        <div class="s-era">${p.era}</div>
        <p class="s-lede">${p.lede}</p>
      </div>
    </div>`;

  // directional slide: forward = enters from right, backward = enters from left
  const dir = i >= prevIndex ? 'go-right' : 'go-left';
  sum.classList.remove('go-right','go-left');
  void sum.offsetWidth;
  sum.classList.add(dir);
  prevIndex = i;

  if(p.placeholder){
    d.innerHTML = `<p class="placeholder-note">Nothing here yet — this slot is being held open.</p>`;
  } else {
    d.innerHTML = `
      <div class="block-grid">
        ${enterBlock(p)}
        ${oeBlock(p.comprised,p.observed,null,p.oe)}
        ${block('Relevant Builds',p.built,'w-2 tall')}
        ${block('Lessons Learned','lessons' in p ? p.lessons : null,'w-6','lesson')}
        ${comps(p)} ${thesis(p)} ${quest(p)}
      </div>`;
  }
  d.style.animation='none'; void d.offsetWidth; d.style.animation='';
}
select(0);
</script>
